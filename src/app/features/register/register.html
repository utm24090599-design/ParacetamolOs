<!-- Navbar -->
<nav class="flex items-center justify-between px-8 py-4 bg-white shadow-sm">
  <div class="bg-gray-200 text-gray-500 text-sm font-medium px-4 py-2 rounded">
    Logo
  </div>
  <ul class="flex gap-8 text-sm font-medium text-gray-700">
    <li class="cursor-pointer hover:text-black">Sobre Nosotros</li>
    <li class="cursor-pointer hover:text-black">Agendar Cita</li>
    <li class="cursor-pointer hover:text-black font-semibold">Ingresar</li>
    <li class="cursor-pointer hover:text-black">Sucursal</li>
  </ul>
</nav>

<!-- Contenido principal -->
<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
  <div class="flex flex-col items-center gap-4 w-full max-w-md">

    <!-- Card principal -->
    <div class="bg-white border border-gray-200 rounded-3xl px-8 pt-0 pb-8 w-full flex flex-col items-center shadow-sm">

      <!-- Avatar -->
      <div class="bg-gray-900 rounded-full w-24 h-24 flex items-center justify-center -mt-12 mb-6 shadow-md">
        <svg class="w-14 h-14 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
      </div>

      <label class="self-start text-lg font-medium text-gray-800 mb-2">
        Correo electronico:
      </label>
      <input
        type="email"
        placeholder="ejemplo@correo.com"
        class="w-full border border-gray-300 rounded-lg px-4 py-3 text-gray-500 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400 mb-4"
      />

      <button class="w-full bg-gray-900 text-white font-medium py-4 rounded-xl hover:bg-gray-700 transition-colors mb-4">
        Enviar Codigo
      </button>

      <div class="border border-gray-300 rounded-lg px-4 py-3 text-xs text-gray-600 text-center">
        Se enviará un código de verificación. Para nuevos usuarios, este
        paso crea la cuenta instantáneamente sin agendar cita previa.
      </div>
    </div>

    <!-- Card registro -->
    <div class="bg-white border border-gray-200 rounded-2xl px-8 py-5 w-full shadow-sm flex flex-col items-center gap-4">
      <p class="text-sm text-gray-700 text-center">
        ¿No tienes cuenta? Haz clic aquí para registrarte (Se usará el mismo correo proporcionado)
      </p>
      <button class="w-full bg-gray-900 text-white font-medium py-4 rounded-xl hover:bg-gray-700 transition-colors">
        Crear cuenta (Sin cita)
      </button>
    </div>

  </div>
</div>
